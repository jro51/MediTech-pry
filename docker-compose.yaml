version: '3.8'
services:
  # Base de datos por servicio (Database per Service pattern)
  auth-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports: ["3307:3306"]

  product-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_ROOT_PASSWORD: root
    ports: ["3308:3306"]

  purchase-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: purchase_db
      MYSQL_ROOT_PASSWORD: root
    ports: ["3309:3306"]

  notification-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: notification_db
      MYSQL_ROOT_PASSWORD: root
    ports: ["3310:3306"]

